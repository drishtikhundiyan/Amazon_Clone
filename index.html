<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Amazon Clone</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Navigation Bar -->
    <nav class="navbar">
      <div class="logo">Amazon Clone</div>
      <div class="search-bar">
        <input type="text" placeholder="Search products..." />
        <button id="searchBtn">Search</button>
      </div>
      <div class="nav-links">
        <a href="#">Sign In</a>
        <a href="#">Cart</a>
      </div>
    </nav>

    <!-- Main Banner -->
    <section class="banner">
      <img src="images/Logo.webp" alt="Amazon Logo" class="logo" />
    </section>

    <!-- Featured Products -->
    <section class="products" id="featured">
      <h2>Featured Products</h2>
      <div class="product-grid" id="product-grid">
        <!-- Products added via JavaScript -->
      </div>
    </section>

    <!-- Deals Section -->
    <section class="deals">
      <h2>Today's Deals</h2>
      <div class="product-grid" id="deals-grid">
        <!-- Deals products added via JavaScript -->
      </div>
    </section>

    <!-- Footer -->
    <footer>
      <p>&copy; 2026 Amazon Clone. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
